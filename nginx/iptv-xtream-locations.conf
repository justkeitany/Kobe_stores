# ================================================================
#  Xtream-only location blocks — included by the dedicated :8080
#  server so IPTV players can connect on the classic Xtream port.
#  (Included inside a server { } context.)
#
#  Exposes ONLY the player-facing Xtream API + stream delivery. The
#  admin panel, REST API and websocket are NOT served here — any such
#  path is redirected to HTTPS, so the dashboard stays https-locked
#  even though :8080 answers plain HTTP for players.
# ================================================================

# Security headers
add_header X-Frame-Options        "SAMEORIGIN"    always;
add_header X-Content-Type-Options "nosniff"       always;
add_header Referrer-Policy        "no-referrer"   always;

# Let's Encrypt HTTP-01 challenge (so certbot can still validate on :8080)
location ^~ /.well-known/acme-challenge/ {
    root /var/www/iptv-panel;
    default_type "text/plain";
    allow all;
}

# Xtream Codes API
location ~ ^/(player_api\.php|get\.php|xmltv\.php|panel_api\.php) {
    limit_req zone=api burst=30 nodelay;
    proxy_pass http://iptv_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    proxy_buffering off;
}

# HLS segments — served directly by Nginx from FFmpeg's local output dir.
location /hls/ {
    alias /var/iptv/hls/;
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t                    ts;
    }
    open_file_cache          max=2000 inactive=10s;
    open_file_cache_valid    2s;
    open_file_cache_min_uses 1;
    open_file_cache_errors   off;
    location ~* \.m3u8$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Access-Control-Allow-Origin * always;
    }
    location ~* \.ts$ {
        add_header Cache-Control "public, max-age=10" always;
        add_header Access-Control-Allow-Origin * always;
    }
    limit_conn stream_conn 10;
}

# Live stream delivery
location /live/ {
    limit_req  zone=stream burst=20 nodelay;
    limit_conn stream_conn 5;
    proxy_pass http://iptv_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_connect_timeout 15s;
    proxy_send_timeout    120s;
    proxy_read_timeout    300s;
    proxy_buffering on;
    proxy_buffer_size       256k;
    proxy_buffers         8 256k;
    proxy_busy_buffers_size 512k;
}

# YouTube proxy — resolves a fresh HLS manifest and 302-redirects the player.
location /proxy/ {
    limit_req zone=api burst=30 nodelay;
    proxy_pass http://iptv_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_connect_timeout 15s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
    proxy_buffering off;
    add_header Access-Control-Allow-Origin * always;
}

# Everything else (admin SPA, /api/, /ws/) is not exposed on :8080 — force it
# back to HTTPS so the dashboard and its API stay encrypted/locked.
location / {
    return 301 https://$host$request_uri;
}
