# ================================================================
#  IPTV Panel — raw-IP redirect control (managed automatically)
#
#  This file is intentionally EMPTY by default. While empty, the panel is
#  reachable over the raw VPS IP (http://<VPS-IP>:25461) — needed so a fresh,
#  domain-less install works before any domain is configured.
#
#  When you set a domain in the dashboard, iptv-ssl-setup.sh overwrites this
#  file with a single line:
#
#      return 301 https://<your-domain>$request_uri;
#
#  That permanently redirects every raw-IP / :8080 / :25461 request to your
#  domain, disabling bare-IP logins. update.sh preserves this file across
#  upgrades. To re-enable raw-IP access, blank this file (leave only comments)
#  and run: systemctl reload nginx
# ================================================================
