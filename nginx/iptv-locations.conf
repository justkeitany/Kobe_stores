# ================================================================
#  Shared location blocks — included by the IP catch-all server
#  AND by any per-domain server block created for HTTPS.
#  (Included inside a server { } context.)
# ================================================================

# Security headers
add_header X-Frame-Options        "SAMEORIGIN"    always;
add_header X-Content-Type-Options "nosniff"       always;
add_header X-XSS-Protection       "1; mode=block" always;
add_header Referrer-Policy        "no-referrer"   always;

# Let's Encrypt HTTP-01 challenge (so certbot can validate the domain)
location ^~ /.well-known/acme-challenge/ {
    root /var/www/iptv-panel;
    default_type "text/plain";
    allow all;
}

# WebSocket — live stats
location /ws/ {
    proxy_pass http://iptv_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host       $http_host;
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# REST API
location /api/ {
    limit_req zone=api burst=50 nodelay;
    proxy_pass http://iptv_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    client_max_body_size 200M;
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
}

# Xtream Codes API
location ~ ^/(player_api\.php|get\.php|xmltv\.php|panel_api\.php) {
    limit_req zone=api burst=30 nodelay;
    proxy_pass http://iptv_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    proxy_buffering off;
    add_header Access-Control-Allow-Origin * always;
}

# HLS segments — served directly by Nginx
location /hls/ {
    alias /var/iptv/hls/;
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t                    ts;
    }
    location ~* \.m3u8$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Access-Control-Allow-Origin * always;
    }
    location ~* \.ts$ {
        add_header Cache-Control "public, max-age=10" always;
        add_header Access-Control-Allow-Origin * always;
    }
    limit_conn stream_conn 10;
}

# Live stream delivery
location /live/ {
    limit_req  zone=stream burst=20 nodelay;
    limit_conn stream_conn 5;
    proxy_pass http://iptv_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_connect_timeout 15s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    proxy_buffering off;
    add_header Access-Control-Allow-Origin * always;
}

# Frontend SPA
location / {
    root /var/www/iptv-panel;
    index index.html;
    try_files $uri $uri/ /index.html;
    location ~* \.(js|css|svg|woff|woff2|ico|png|jpg|jpeg|gif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
