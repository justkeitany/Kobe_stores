# Shared location blocks included by both HTTP and HTTPS server blocks

real_ip_header CF-Connecting-IP;

access_log /var/log/nginx/iptv-access.log combined buffer=16k flush=5s;
error_log  /var/log/nginx/iptv-error.log warn;

add_header X-Frame-Options SAMEORIGIN always;
add_header X-Content-Type-Options nosniff always;

location /hls/ {
    alias /var/iptv/hls/;
    add_header Access-Control-Allow-Origin * always;
    add_header Cache-Control "no-cache" always;
    types { application/vnd.apple.mpegurl m3u8; video/mp2t ts; }
    location ~* \.m3u8$ { add_header Cache-Control "no-cache, no-store, must-revalidate" always; }
    location ~* \.ts$ { add_header Cache-Control "public, max-age=10" always; }
}

location ~ ^/(player_api\.php|get\.php|xmltv\.php) {
    proxy_pass http://iptv_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
}

location /live/ {
    proxy_pass http://iptv_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_read_timeout 60s;
}

location /ws/ {
    proxy_pass http://iptv_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
}

location /api/ {
    proxy_pass http://iptv_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 100M;
    proxy_read_timeout 120s;
}

location / {
    root /var/www/iptv-panel;
    index index.html;
    try_files $uri $uri/ /index.html;
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain application/json application/javascript text/css application/vnd.apple.mpegurl;
