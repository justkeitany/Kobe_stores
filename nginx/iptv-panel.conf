# ================================================================
#  IPTV Panel — Nginx configuration
#
#  tv.keitanyfrank.store   → Admin dashboard (Cloudflare proxied)
#  live.keitanyfrank.store → Xtream Codes / HLS (DNS only, no proxy)
#
#  Server IP: 172.237.102.20 (Linode, London)
# ================================================================

limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/s;
limit_req_zone  $binary_remote_addr zone=stream:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=stream_conn:10m;

upstream iptv_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

# ── 1. Admin Dashboard — tv.keitanyfrank.store ────────────────
#    Cloudflare proxied (orange cloud ON)
#    Only serves the React frontend + API
server {
    listen 80;
    listen [::]:80;
    server_name tv.keitanyfrank.store;

    # Trust Cloudflare real IPs
    real_ip_header    CF-Connecting-IP;
    set_real_ip_from  103.21.244.0/22;
    set_real_ip_from  103.22.200.0/22;
    set_real_ip_from  103.31.4.0/22;
    set_real_ip_from  104.16.0.0/13;
    set_real_ip_from  104.24.0.0/14;
    set_real_ip_from  108.162.192.0/18;
    set_real_ip_from  131.0.72.0/22;
    set_real_ip_from  141.101.64.0/18;
    set_real_ip_from  162.158.0.0/15;
    set_real_ip_from  172.64.0.0/13;
    set_real_ip_from  173.245.48.0/20;
    set_real_ip_from  188.114.96.0/20;
    set_real_ip_from  190.93.240.0/20;
    set_real_ip_from  197.234.240.0/22;
    set_real_ip_from  198.41.128.0/17;

    access_log /var/log/nginx/tv-access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/tv-error.log warn;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # WebSocket for live stats
    location /ws/ {
        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;

        client_max_body_size 200M;
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # Frontend SPA
    location / {
        root /var/www/iptv-panel;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|svg|woff|woff2|ttf|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript text/css;
}

# ── 2. Xtream / Streaming — live.keitanyfrank.store ───────────
#    DNS only (grey cloud) — no Cloudflare proxy
#    Port 80 HTTP — players connect here directly, NO redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name live.keitanyfrank.store;

    access_log /var/log/nginx/live-access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/live-error.log warn;

    # Allow CORS for all player apps
    add_header Access-Control-Allow-Origin  * always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range, Authorization" always;

    # ── HLS segments served directly by Nginx (fastest path) ─
    location /hls/ {
        alias /var/iptv/hls/;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
        }

        location ~* \.m3u8$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma        no-cache always;
            add_header Expires       0 always;
            add_header Access-Control-Allow-Origin * always;
        }

        location ~* \.ts$ {
            add_header Cache-Control "public, max-age=10" always;
            add_header Access-Control-Allow-Origin * always;
        }

        limit_conn stream_conn 10;
    }

    # ── Xtream Codes API (no PHP) ─────────────────────────────
    location ~ ^/(player_api\.php|get\.php|xmltv\.php|panel_api\.php) {
        limit_req zone=api burst=30 nodelay;

        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host        $host;
        proxy_set_header X-Real-IP   $remote_addr;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_buffering off;
    }

    # ── Live stream delivery ───────────────────────────────────
    location /live/ {
        limit_req  zone=stream burst=20 nodelay;
        limit_conn stream_conn 5;

        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 15s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        proxy_buffering off;
    }

    # Block everything else on the stream domain
    location / {
        return 444;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/vnd.apple.mpegurl application/json;
}

# ── 3. HTTPS for tv.keitanyfrank.store ────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tv.keitanyfrank.store;

    ssl_certificate     /etc/ssl/iptv/tv-cert.pem;
    ssl_certificate_key /etc/ssl/iptv/tv-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    real_ip_header CF-Connecting-IP;

    location /ws/ {
        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        client_max_body_size 200M;
        proxy_read_timeout 120s;
    }

    location / {
        root /var/www/iptv-panel;
        index index.html;
        try_files $uri $uri/ /index.html;
        location ~* \.(js|css|svg|woff|woff2|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}

# ── 4. HTTPS for live.keitanyfrank.store ──────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name live.keitanyfrank.store;

    ssl_certificate     /etc/ssl/iptv/live-cert.pem;
    ssl_certificate_key /etc/ssl/iptv/live-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    add_header Access-Control-Allow-Origin * always;

    location /hls/ {
        alias /var/iptv/hls/;
        types { application/vnd.apple.mpegurl m3u8; video/mp2t ts; }
        location ~* \.m3u8$ { add_header Cache-Control "no-cache" always; }
        location ~* \.ts$    { add_header Cache-Control "public, max-age=10" always; }
        limit_conn stream_conn 10;
    }

    location ~ ^/(player_api\.php|get\.php|xmltv\.php|panel_api\.php) {
        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 30s;
    }

    location /live/ {
        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    location / { return 444; }
}
