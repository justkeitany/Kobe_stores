# ================================================================
#  IPTV Panel — Nginx configuration (domain-less / IP based)
#
#  Serves the dashboard, REST API, Xtream Codes API, HLS and live
#  streams on a catch-all server, reachable at:
#       http://<VPS-IP>          (port 80)
#       http://<VPS-IP>:8080     (port 8080)
#
#  server_name _ answers on the raw IP AND on any domain later
#  pointed at this VPS — no nginx change needed to use a domain
#  over HTTP. For HTTPS on a domain, run certbot (see README).
#
#  A Cloudflare-proxied HTTPS variant is kept in
#  iptv-panel-cloudflare.conf.example for advanced setups.
# ================================================================

limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/s;
limit_req_zone  $binary_remote_addr zone=stream:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=stream_conn:10m;

upstream iptv_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 8080;
    listen [::]:8080;
    server_name _;

    access_log /var/log/nginx/iptv-access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/iptv-error.log warn;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer"   always;

    # WebSocket — live stats
    location /ws/ {
        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $http_host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host             $http_host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        client_max_body_size 200M;
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # Xtream Codes API
    location ~ ^/(player_api\.php|get\.php|xmltv\.php|panel_api\.php) {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_buffering off;
        add_header Access-Control-Allow-Origin * always;
    }

    # HLS segments — served directly by Nginx
    location /hls/ {
        alias /var/iptv/hls/;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
        }
        location ~* \.m3u8$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Access-Control-Allow-Origin * always;
        }
        location ~* \.ts$ {
            add_header Cache-Control "public, max-age=10" always;
            add_header Access-Control-Allow-Origin * always;
        }
        limit_conn stream_conn 10;
    }

    # Live stream delivery
    location /live/ {
        limit_req  zone=stream burst=20 nodelay;
        limit_conn stream_conn 5;
        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_connect_timeout 15s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        proxy_buffering off;
        add_header Access-Control-Allow-Origin * always;
    }

    # Frontend SPA
    location / {
        root /var/www/iptv-panel;
        index index.html;
        try_files $uri $uri/ /index.html;
        location ~* \.(js|css|svg|woff|woff2|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript text/css;
}
