# IPTV Panel - Nginx configuration
# Domain: live.keitanyfrank.store
# Cloudflare proxied → SSL terminated at Cloudflare edge
# This config handles HTTP (80) and HTTPS (443) behind Cloudflare

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=stream:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=stream_conn:10m;

# Upstream FastAPI backend
upstream iptv_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name live.keitanyfrank.store;

    # Trust Cloudflare's forwarded IP
    real_ip_header CF-Connecting-IP;

    # Logging
    access_log /var/log/nginx/iptv-access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/iptv-error.log warn;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # ── HLS segments (served directly by Nginx for max speed) ────────────
    location /hls/ {
        alias /var/iptv/hls/;
        
        # CORS for players
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Cache-Control "no-cache, no-store" always;

        # HLS-specific
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        # Don't cache .m3u8 playlists (they change every segment)
        location ~* \.m3u8$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma no-cache always;
            add_header Expires 0 always;
            add_header Access-Control-Allow-Origin * always;
        }

        # Cache .ts segments briefly (they're immutable once written)
        location ~* \.ts$ {
            add_header Cache-Control "public, max-age=10" always;
            add_header Access-Control-Allow-Origin * always;
        }

        limit_conn stream_conn 5;
    }

    # ── Xtream Codes API endpoints (no PHP) ──────────────────────────────
    location ~ ^/(player_api\.php|get\.php|xmltv\.php|panel_api\.php) {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        proxy_buffering off;
    }

    # ── Live stream endpoint ──────────────────────────────────────────────
    location /live/ {
        limit_req zone=stream burst=10 nodelay;
        limit_conn stream_conn 3;

        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # ── WebSocket for live stats ──────────────────────────────────────────
    location /ws/ {
        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST API ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://iptv_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

        # Large body for M3U uploads
        client_max_body_size 100M;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ── Frontend (Vite build) ─────────────────────────────────────────────
    location / {
        root /var/www/iptv-panel;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript text/css
               application/xml application/vnd.apple.mpegurl;
}

# HTTPS (443) — Cloudflare handles SSL termination, but keep this for direct access
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name live.keitanyfrank.store;

    # Self-signed or Let's Encrypt cert (Cloudflare proxied = Cloudflare cert at edge)
    ssl_certificate     /etc/ssl/iptv/cert.pem;
    ssl_certificate_key /etc/ssl/iptv/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # Include all the same location blocks
    include /etc/nginx/snippets/iptv-locations.conf;
}

# Port 8080 (optional direct access)
server {
    listen 8080;
    server_name live.keitanyfrank.store _;

    location / {
        return 301 http://$host$request_uri;
    }
}
