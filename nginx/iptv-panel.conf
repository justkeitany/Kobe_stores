# ================================================================
#  IPTV Panel — Nginx configuration (catch-all / raw-IP entry)
#
#  Serves the dashboard, REST API, Xtream Codes API, HLS and live
#  streams on a catch-all server. Ports:
#       http://<VPS-IP>:25461   → dashboard / admin panel
#       http://<VPS-IP>:8080    → Xtream Codes API for players
#       http://<VPS-IP>         → both (port 80)
#
#  server_name _ answers on the raw IP AND on any domain pointed at
#  this VPS. When you set a domain in the dashboard, a dedicated HTTPS
#  server block is created automatically by iptv-ssl-setup.sh (certbot),
#  and that same script locks this catch-all onto your domain by writing
#  snippets/iptv-redirect.conf (see the include below).
#
#  Shared location blocks live in snippets/iptv-locations.conf.
#  A Cloudflare-proxied variant is in iptv-panel-cloudflare.conf.example.
# ================================================================

limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/s;
limit_req_zone  $binary_remote_addr zone=stream:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=stream_conn:10m;

upstream iptv_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 25461 default_server;   # dashboard / admin panel
    listen [::]:25461 default_server;
    listen 8080;                   # Xtream Codes API for players
    listen [::]:8080;
    server_name _;

    access_log /var/log/nginx/iptv-access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/iptv-error.log warn;

    # Raw-IP redirect control. EMPTY by default, so a fresh (domain-less)
    # install is reachable at http://<VPS-IP>:25461. Once you configure a
    # domain, iptv-ssl-setup.sh rewrites this snippet with
    #     return 301 https://<your-domain>$request_uri;
    # which short-circuits everything below and locks all raw-IP / :8080 /
    # :25461 access onto your domain (disabling bare-IP logins). update.sh
    # never overwrites it, so the lock survives upgrades.
    include snippets/iptv-redirect.conf;

    include snippets/iptv-locations.conf;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript text/css application/vnd.apple.mpegurl;
}
