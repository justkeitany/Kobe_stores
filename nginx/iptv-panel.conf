# ================================================================
#  IPTV Panel — Nginx configuration (catch-all / raw-IP guard)
#
#  Raw-IP access is intentionally DISABLED. The panel is served only
#  over its canonical HTTPS domain (set in the dashboard, HTTPS block
#  created by /usr/local/sbin/iptv-ssl-setup.sh via certbot). This
#  catch-all answers the old IP-based entry points —
#       http://<VPS-IP>:25461   (was: dashboard / admin panel)
#       http://<VPS-IP>:8080    (was: Xtream Codes API for players)
#       http://<VPS-IP>         (port 80)
#  — and permanently redirects every one of them to the domain, so the
#  bare IP can no longer be used to log in or stream. Old links keep
#  working (they bounce to the domain); nothing is served here directly.
#
#  ┌─ To change the canonical domain, edit CANONICAL_HOST below. ─┐
#  The dashboard's "Public Server URL" setting must match it, since
#  that is what gets stamped into every generated playlist.
#
#  Shared location blocks live in snippets/iptv-locations.conf and are
#  included by the domain's HTTPS block (created by iptv-ssl-setup.sh).
# ================================================================

limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/s;
limit_req_zone  $binary_remote_addr zone=stream:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=stream_conn:10m;

upstream iptv_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 25461 default_server;   # legacy dashboard port — now redirected
    listen [::]:25461 default_server;
    listen 8080;                   # legacy Xtream API port — now redirected
    listen [::]:8080;
    server_name _;

    access_log /var/log/nginx/iptv-access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/iptv-error.log warn;

    # Force everyone onto the canonical HTTPS domain. The bare IP and the
    # legacy :8080/:25461 ports no longer serve the API, dashboard or streams —
    # every request is permanently redirected. $request_uri preserves the path
    # and query string so existing deep links still resolve on the domain.
    return 301 https://live.keitanyfrank.store$request_uri;
}
